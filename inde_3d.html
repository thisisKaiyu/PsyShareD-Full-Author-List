<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>3D Brain Viewer</title>
  <script src="https://unpkg.com/@niivue/niivue/dist/niivue.umd.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
      min-height: 100vh;
    }

    h2 {
      margin-top: 10px;
      font-size: 24px;
      color: #00d2ff;
    }

    p.subtitle {
      margin: 6px 0 16px;
      font-size: 14px;
      color: #aaa;
    }

    .controls {
      margin-bottom: 16px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      padding: 8px 18px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #0f3460;
      color: #fff;
      font-size: 14px;
      transition: background 0.2s;
    }

    button:hover {
      background: #00d2ff;
      color: #1a1a2e;
    }

    .canvas-wrap {
      width: 90%;
      max-width: 960px;
      margin: 0 auto;
      position: relative;
    }

    #gl {
      width: 100%;
      height: 600px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .slider-group {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .slider-group label {
      font-size: 13px;
      color: #aaa;
    }

    .slider-group input[type="range"] {
      width: 180px;
    }

    footer {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>

  <h2>Voxel-wise GMV Alterations (3D)</h2>
  <p class="subtitle">FEP vs Healthy Controls</p>

  <!-- 视图切换按钮 -->
  <div class="controls">
    <button onclick="setView('3d')">🧠 3D 渲染</button>
    <button onclick="setView('multi')">🔲 多平面切片</button>
    <button onclick="setView('axial')">➖ 轴状位</button>
    <button onclick="setView('coronal')">➖ 冠状位</button>
    <button onclick="setView('sagittal')">➖ 矢状位</button>
    <button onclick="resetView()">🔄 重置视角</button>
  </div>

  <!-- 画布 -->
  <div class="canvas-wrap">
    <canvas id="gl"></canvas>
  </div>

  <!-- 透明度和阈值滑块 -->
  <div class="slider-group">
    <label>叠加层透明度：</label>
    <input type="range" id="opacitySlider" min="0" max="100" value="70"
           oninput="changeOpacity(this.value)">
    <span id="opacityVal">70%</span>

    <label style="margin-left: 20px;">阈值下限：</label>
    <input type="range" id="minSlider" min="0" max="10" value="2" step="0.1"
           oninput="changeThreshold()">
    <span id="minVal">2.0</span>

    <label>阈值上限：</label>
    <input type="range" id="maxSlider" min="0" max="10" value="6" step="0.1"
           oninput="changeThreshold()">
    <span id="maxVal">6.0</span>
  </div>

  <footer>
    Powered by <a href="https://github.com/niivue/niivue" style="color:#00d2ff;">NiiVue</a>
    &nbsp;|&nbsp; 使用鼠标拖拽旋转 3D 视图，滚轮缩放
  </footer>

  <script>
    let nv;

    async function init() {
      nv = new niivue.Niivue({
        backColor: [0.05, 0.05, 0.12, 1],
        show3Dcrosshair: false,
        crosshairColor: [0, 0.8, 1, 0.5],
      });

      nv.attachToCanvas(document.getElementById("gl"));

      await nv.loadVolumes([
        {
          url: "ch256.nii",           // 底层解剖图像（同目录）
          colormap: "gray",
          opacity: 1.0,
        },
        {
          url: "stat_map.nii.gz",     // 统计图叠加层（同目录）
          colormap: "warm",
          opacity: 0.7,
          cal_min: 2,
          cal_max: 6,
        },
      ]);

      // 默认进入 3D 渲染视图
      setView("3d");
    }

    // ---- 视图切换 ----
    function setView(type) {
      switch (type) {
        case "3d":
          nv.setSliceType(nv.sliceTypeRender);
          break;
        case "multi":
          nv.setSliceType(nv.sliceTypeMultiplanar);
          break;
        case "axial":
          nv.setSliceType(nv.sliceTypeAxial);
          break;
        case "coronal":
          nv.setSliceType(nv.sliceTypeCoronal);
          break;
        case "sagittal":
          nv.setSliceType(nv.sliceTypeSagittal);
          break;
      }
    }

    function resetView() {
      nv.setRenderAzimuthElevation(120, 20);
    }

    // ---- 叠加层透明度 ----
    function changeOpacity(val) {
      const opacity = val / 100;
      document.getElementById("opacityVal").textContent = val + "%";
      nv.setOpacity(1, opacity);   // 索引 1 = 第二个加载的 volume
    }

    // ---- 阈值调节 ----
    function changeThreshold() {
      const minVal = parseFloat(document.getElementById("minSlider").value);
      const maxVal = parseFloat(document.getElementById("maxSlider").value);
      document.getElementById("minVal").textContent = minVal.toFixed(1);
      document.getElementById("maxVal").textContent = maxVal.toFixed(1);
      nv.volumes[1].cal_min = minVal;
      nv.volumes[1].cal_max = maxVal;
      nv.updateGLVolume();
    }

    // 启动
    init();
  </script>

</body>
</html>
