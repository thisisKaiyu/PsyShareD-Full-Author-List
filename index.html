<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Interactive Brain Map</title>

  <link rel="stylesheet" type="text/css"
        href="https://rii-mango.github.io/Papaya/release/current/standard/papaya.css">
  <script type="text/javascript"
          src="https://rii-mango.github.io/Papaya/release/current/standard/papaya.js"></script>

  <script type="text/javascript">
    var params = [];
    params["images"] = ["ch256.nii", "stat_map.nii.gz"];
    params["worldSpace"] = true;
    params["stat_map.nii.gz"] = { min: 2, max: 6 };
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffffff;
      margin: 20px;
    }
    .papaya {
      margin: auto;
    }
  </style>
</head>
<body>
  <h2>Voxel-wise GMV Alterations</h2>
  <p>FEP vs Healthy Controls</p>
  <div class="papaya" data-params="params"></div>
</body>
</html>
